<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#3182ce">
    <title>心语 - 登录</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .login-page { width: 100%; max-width: 400px; padding: 20px; }
        .login-logo { text-align: center; margin-bottom: 40px; }
        .login-logo .logo-big { font-size: 64px; display: block; margin-bottom: 12px; animation: breathe 3s ease-in-out infinite; }
        .login-logo h1 { color: #fff; font-size: 32px; font-weight: 700; letter-spacing: 2px; }
        .login-logo p { color: rgba(255,255,255,0.8); font-size: 14px; margin-top: 8px; }
        .login-card { background: rgba(255,255,255,0.95); border-radius: 20px; padding: 32px 24px; box-shadow: 0 20px 60px rgba(0,0,0,0.2); backdrop-filter: blur(10px); }
        .login-tabs { display: flex; margin-bottom: 28px; background: #f1f5f9; border-radius: 12px; padding: 4px; }
        .login-tab { flex: 1; padding: 10px; text-align: center; border: none; background: transparent; border-radius: 10px; font-size: 15px; font-weight: 600; color: #64748b; cursor: pointer; transition: all 0.3s; font-family: inherit; }
        .login-tab.active { background: #fff; color: #3182ce; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
        .login-form { display: none; }
        .login-form.active { display: block; }
        .form-field { margin-bottom: 18px; }
        .form-field label { display: block; font-size: 13px; font-weight: 600; color: #475569; margin-bottom: 6px; }
        .form-field input { width: 100%; padding: 12px 14px; border: 2px solid #e2e8f0; border-radius: 12px; font-size: 15px; color: #1e293b; background: #f8fafc; outline: none; transition: all 0.2s; font-family: inherit; }
        .form-field input:focus { border-color: #6366f1; background: #fff; box-shadow: 0 0 0 3px rgba(99,102,241,0.1); }
        .form-field input::placeholder { color: #94a3b8; }
        .gender-select { display: flex; gap: 10px; margin-bottom: 18px; }
        .gender-option { flex: 1; padding: 12px; border: 2px solid #e2e8f0; border-radius: 12px; text-align: center; cursor: pointer; transition: all 0.2s; background: #f8fafc; }
        .gender-option.active { border-color: #6366f1; background: #eef2ff; }
        .gender-option span { display: block; font-size: 24px; margin-bottom: 4px; }
        .gender-option small { font-size: 13px; color: #64748b; font-weight: 500; }
        .login-btn { width: 100%; padding: 13px; background: linear-gradient(135deg, #6366f1, #818cf8); color: #fff; border: none; border-radius: 12px; font-size: 16px; font-weight: 600; cursor: pointer; transition: all 0.2s; font-family: inherit; }
        .login-btn:hover { box-shadow: 0 4px 16px rgba(99,102,241,0.4); transform: translateY(-1px); }
        .login-btn:active { transform: scale(0.98); }
        .login-skip { display: block; text-align: center; margin-top: 16px; color: #94a3b8; font-size: 13px; text-decoration: none; cursor: pointer; }
        .login-skip:hover { color: #64748b; }
        .login-error { color: #ef4444; font-size: 13px; margin-top: 8px; display: none; text-align: center; }
    </style>
</head>
<body>
    <div class="login-page">
        <div class="login-logo">
            <span class="logo-big">💙</span>
            <h1>心语</h1>
            <p>你的情绪小助手</p>
        </div>
        <div class="login-card">
            <div class="login-tabs">
                <button class="login-tab active" onclick="switchLoginTab('login')">登录</button>
                <button class="login-tab" onclick="switchLoginTab('register')">注册</button>
            </div>

            <form class="login-form active" id="loginForm" onsubmit="return doLogin(event)">
                <div class="form-field">
                    <label>👤 用户名</label>
                    <input type="text" id="loginUser" placeholder="请输入用户名" required>
                </div>
                <div class="form-field">
                    <label>🔒 密码</label>
                    <input type="password" id="loginPass" placeholder="请输入密码" required>
                </div>
                <div class="login-error" id="loginError"></div>
                <button type="submit" class="login-btn">登 录</button>
                <a class="login-skip" onclick="skipLogin()">先逛逛，不登录 →</a>
            </form>

            <form class="login-form" id="registerForm" onsubmit="return doRegister(event)">
                <div class="form-field">
                    <label>👤 用户名</label>
                    <input type="text" id="regUser" placeholder="设置用户名" required>
                </div>
                <div class="form-field">
                    <label>🔒 密码</label>
                    <input type="password" id="regPass" placeholder="设置密码（至少4位）" required minlength="4">
                </div>
                <div class="form-field">
                    <label>🎂 昵称</label>
                    <input type="text" id="regNickname" placeholder="你希望被怎么称呼？">
                </div>
                <div class="gender-select">
                    <div class="gender-option active" onclick="selectRegGender('male', this)">
                        <span>👦</span><small>男生</small>
                    </div>
                    <div class="gender-option" onclick="selectRegGender('female', this)">
                        <span>👧</span><small>女生</small>
                    </div>
                </div>
                <div class="login-error" id="regError"></div>
                <button type="submit" class="login-btn">注 册</button>
                <a class="login-skip" onclick="skipLogin()">先逛逛，不注册 →</a>
            </form>
        </div>
    </div>

    <script>
        let regGender = 'male';

        function switchLoginTab(tab) {
            document.querySelectorAll('.login-tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.login-form').forEach(f => f.classList.remove('active'));
            if (tab === 'login') {
                document.querySelectorAll('.login-tab')[0].classList.add('active');
                document.getElementById('loginForm').classList.add('active');
            } else {
                document.querySelectorAll('.login-tab')[1].classList.add('active');
                document.getElementById('registerForm').classList.add('active');
            }
        }

        function selectRegGender(g, el) {
            regGender = g;
            document.querySelectorAll('.gender-option').forEach(o => o.classList.remove('active'));
            el.classList.add('active');
        }

        function getUsers() { return JSON.parse(localStorage.getItem('xinyu_users') || '[]'); }
        function saveUsers(u) { localStorage.setItem('xinyu_users', JSON.stringify(u)); }

        function doLogin(e) {
            e.preventDefault();
            const user = document.getElementById('loginUser').value.trim();
            const pass = document.getElementById('loginPass').value;
            const err = document.getElementById('loginError');
            const users = getUsers();
            const found = users.find(u => u.username === user && u.password === pass);
            if (!found) { err.textContent = '用户名或密码错误'; err.style.display = 'block'; return false; }
            localStorage.setItem('xinyu_current_user', JSON.stringify(found));
            window.location.href = 'index.html';
            return false;
        }

        function doRegister(e) {
            e.preventDefault();
            const user = document.getElementById('regUser').value.trim();
            const pass = document.getElementById('regPass').value;
            const nick = document.getElementById('regNickname').value.trim() || user;
            const err = document.getElementById('regError');
            const users = getUsers();
            if (users.some(u => u.username === user)) { err.textContent = '用户名已存在'; err.style.display = 'block'; return false; }
            const newUser = { username: user, password: pass, nickname: nick, gender: regGender, created: new Date().toISOString() };
            users.push(newUser);
            saveUsers(users);
            localStorage.setItem('xinyu_current_user', JSON.stringify(newUser));
            window.location.href = 'index.html';
            return false;
        }

        function skipLogin() { window.location.href = 'index.html'; }

        // 已登录直接跳转
        if (localStorage.getItem('xinyu_current_user')) { window.location.href = 'index.html'; }
    </script>
</body>
</html>
